<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DELTA FORCE - 多区域物资翻牌</title>
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <main class="hud">
    <div class="title-box">
      <div class="label-panel">
        <strong>DELTA FORCE</strong>
        <span id="mapNameTop">当前区域：零号大坝</span>
      </div>
      <div class="label-panel">
        <strong>LEO</strong>
        <span id="coinCount">哈弗币：0</span>
      </div>
    </div>

    <div class="toolbar">
      <button class="codex-button" id="codexButton" aria-label="打开图鉴">图鉴</button>
    </div>

    <section class="map-row">
      <button class="arrow-button" id="prevMap" aria-label="上一个卡池">◀</button>
      <button class="map-button" id="drawButton" aria-label="进入当前区域并生成三张卡牌">
        <div class="shell tactical-frame">
          <div class="core">
            <div class="button-title" id="buttonTitle">零号大坝</div>
          </div>
          <div class="map-cost" id="mapCost">消耗：0 哈弗币</div>
        </div>
      </button>
      <button class="arrow-button" id="nextMap" aria-label="下一个卡池">▶</button>
    </section>

    <section class="spawn-area cards hidden" id="cardsArea" aria-live="polite"></section>
    <div class="hint">点击当前区域按钮：先发放上次累计哈弗币，再判断是否足够进入当前区域，并生成 3 张物资卡。</div>
    <div class="toast" id="toast"></div>
  </main>

  <div class="codex-overlay" id="codexOverlay" aria-hidden="true">
    <section class="codex-panel">
      <div class="codex-header">
        <div class="codex-title">红色物资图鉴</div>
        <button class="codex-close" id="codexClose">关闭</button>
      </div>
      <div class="codex-grid" id="codexGrid"></div>
    </section>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
